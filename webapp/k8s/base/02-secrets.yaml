apiVersion: v1
kind: Secret
metadata:
  name: cline-secrets
  namespace: cline
type: Opaque
stringData:
  # JWT Secret - Change in production!
  JWT_SECRET: "your-super-secret-jwt-key-change-in-production"
  
  # Database
  DB_PASSWORD: "postgres"
  
  # Redis
  REDIS_PASSWORD: ""
  
  # AI Providers (add actual keys in production)
  ANTHROPIC_API_KEY: ""
  OPENAI_API_KEY: ""
  GOOGLE_API_KEY: ""
  OPENROUTER_API_KEY: ""
  
  # AWS (if using Bedrock)
  AWS_ACCESS_KEY_ID: ""
  AWS_SECRET_ACCESS_KEY: ""
  
  # Azure
  AZURE_OPENAI_API_KEY: ""
  AZURE_OPENAI_ENDPOINT: ""
