apiVersion: v1
kind: ConfigMap
metadata:
  name: cline-config
  namespace: cline
data:
  NODE_ENV: "production"
  PORT: "8080"
  DATABASE_HOST: "postgres"
  DATABASE_PORT: "5432"
  REDIS_URL: "redis://redis:6379"
  AI_SERVICE_URL: "http://ai-service:8083"
  TASK_SERVICE_URL: "http://task-service:8082"
  BROWSER_SERVICE_URL: "http://browser-service:8084"
  STORAGE_SERVICE_URL: "http://storage-service:8085"
  MCP_SERVICE_URL: "http://mcp-service:8086"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
  RATE_LIMIT_WINDOW: "60000"
  RATE_LIMIT_MAX: "100"
  CORS_ORIGIN: "https://app.cline.bot"
